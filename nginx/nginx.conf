events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    # Redirection HTTP → HTTPS
    server {
        listen 80;
        server_name artibot.fatonfaton.fr;
        return 301 https://$host$request_uri;
    }

    # Frontend HTTPS — artibot.fatonfaton.fr
    server {
        listen 443 ssl;
        server_name artibot.fatonfaton.fr;

        ssl_certificate /etc/letsencrypt/live/artibot.fatonfaton.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/artibot.fatonfaton.fr/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
