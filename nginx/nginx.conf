events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    # Redirection HTTP → HTTPS
    server {
        listen 80;
        server_name artibot.fr api.artibot.fr;
        return 301 https://$host$request_uri;
    }

    # Frontend — artibot.fr
    server {
        listen 443 ssl;
        server_name artibot.fr;

        ssl_certificate /etc/letsencrypt/live/artibot.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/artibot.fr/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Sécurité
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Next.js frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # Backend — api.artibot.fr
    server {
        listen 443 ssl;
        server_name api.artibot.fr;

        ssl_certificate /etc/letsencrypt/live/api.artibot.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.artibot.fr/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # FastAPI backend
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout pour les webhooks Pub/Sub
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # Limite de taille pour upload PDF
        client_max_body_size 20m;
    }

    # Config pour développement local (HTTP uniquement)
    server {
        listen 80;
        server_name localhost;

        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 20m;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
